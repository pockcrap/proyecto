  <style>
    * {
      transition: all 0.3s;
    }

    .link-a-inicio {
      margin-top: 40px;
      display: block;
      color: black;
    }
    .menu {
      position: fixed;
      top:0;
      left: -150px;
      width: 150px;
      height: 100%;
      background: orange;
      padding-top: 20px;
      transition: 0.3s;
    }

    .menu a {
     display: block;
     color: black;
     padding: 20px;
     text-decoration: none;
    }
    
    .menu a:hover {
      background: yellow;
    }

    .menu.abierto {
      left: 0;
    }

    .btn-menu {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: orange;
      border: none;
      cursor: pointer;
      padding: 10px 15px;
      font-size: 20px;
    }

    .btn-menu:hover {
      background: yellow;
    }

    .fondo1 {
      background: linear-gradient(-45deg, #0a48bb, rgb(16, 14, 168), rgb(73, 4, 87), purple );
      background-size: 400% 400%;
      animation: fondoAnimado 10s ease infinite;
    }

    .fondo2 {
     background: url("fondos/fondo2.gif");
     background-size: cover;
     background-repeat: no-repeat;
     background-attachment: fixed;
    }

    .fondo3 {
     background: url("fondos/fondo3.gif");
     background-size: cover;
     background-repeat: no-repeat;
     background-attachment: fixed;
    }

    .fondo4 {
     background: url("fondos/fondo4.gif");
     background-size: cover;
     background-repeat: no-repeat;
     background-attachment: fixed; 
    }

    body {
      padding: 0;
      margin: 0;
      text-align: center;
      font-family: calibri;
      font-size: 120%;
    }

    @keyframes fondoAnimado {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .contenedor {
      width: 98vw;
      height: 97vh;
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .encabezado {
      position: relative;
      background: orange;
      min-width: 300px;
      width: 70%;
      max-width: 600px;
      padding: 10px;
    }

    .categoria {
      opacity: 0.7;
      text-align: left;
    }

    .pregunta {
      padding: 10px;
    }

    .imagen {
      object-fit: cover;
      max-height: 300px;
      width: 100%;
    }

    .btn {
      background: orange;
      width: 60%;
      max-width: 550px;
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.05);
    }
    
    .numero{
      position: absolute;
      opacity:0.7;
      top: 10px;
      right: 10px;
    }
    
    .puntaje{
      padding:10px;
      color:rgb(160, 160, 160);
    }
  </style>
</head>
